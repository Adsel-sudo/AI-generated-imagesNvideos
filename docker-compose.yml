services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - app

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - api
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - app

  redis:
    image: redis:7-alpine
    networks:
      - app

  # Optional PostgreSQL service for long-running/AWS-style environments.
  # Enable with: docker compose --profile postgres up --build
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: aigenerated
      POSTGRES_USER: aigenerated
      POSTGRES_PASSWORD: aigenerated
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - api
      - frontend
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
