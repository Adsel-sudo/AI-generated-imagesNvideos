services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - api

  redis:
    image: redis:7-alpine

  # Optional PostgreSQL service for long-running/AWS-style environments.
  # Enable with: docker compose --profile postgres up --build
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: aigenerated
      POSTGRES_USER: aigenerated
      POSTGRES_PASSWORD: aigenerated
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - api

volumes:
  postgres_data:
